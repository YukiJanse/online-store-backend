name: deploy.yml
on:
  push:
    branches: ["main", "master"]

jobs:
  tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven

      - name: Run tests
        env:
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
        run: mvn clean verify

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build JAR
        run: mvn package -DskipTests --batch-mode

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  deploy:
    name: Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-deploy-session
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Generate deployment package name
        id: vars
        run: echo "artifact=app-${{ github.sha }}.jar" >> $GITHUB_OUTPUT

      - name: Upload JAR to S3
        run: |
          aws s3 cp target/*.jar s3://${{ secrets.AWS_S3_BUCKET }}/${{ steps.vars.outputs.artifact }}

      - name: Create new Elastic Beanstalk version
        run: |
          aws elasticbeanstalk create-application-version \
          --application-name ${{ secrets.AWS_EB_APP_NAME }} \
          --version-label ${{ github.sha }} \
          --source-bundle S3Bucket=${{ secrets.AWS_S3_BUCKET }},S3Key=${{ steps.vars.outputs.artifact }}

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
          --application-name ${{ secrets.AWS_EB_APP_NAME }} \
          --environment-name ${{ secrets.AWS_EB_ENV_NAME }} \
          --version-label ${{ github.sha }}

      - name: Wait for deployment to complete
        run: |
          aws elasticbeanstalk wait environment-updated \
          --application-name ${{ secrets.AWS_EB_APP_NAME }} \
          --environment-names ${{ secrets.AWS_EB_ENV_NAME }}